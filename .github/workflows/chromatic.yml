name: Chromatic

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Chromatic Visual Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # TurboSnap이 git 히스토리 전체를 참조함

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true # TurboSnap: 변경된 스토리만 테스트해 빌드 시간 단축
          autoAcceptChanges: develop # PR 머지 후 develop push 시 baseline 자동 업데이트
